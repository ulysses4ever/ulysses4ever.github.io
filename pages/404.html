<script>
  (function() {
    var path = window.location.pathname;
    var targetDomain = "https://ulysses4ever.github.io";

    // Check if the path starts with the portion you want to redirect
    if (path.startsWith('/Papers/') || path.startsWith('/Talks/')) {
      // Redirect to the same path on the new domain
      window.location.replace(targetDomain + path + window.location.search + window.location.hash);
    }
  })();
</script>
