name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-binary:
    # Run when site.hs or the Nix/Cabal build inputs change, or on manual dispatch.
    # head_commit is only populated on push events, so this job is implicitly skipped on PRs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'site.hs') ||
      contains(github.event.head_commit.added,    'site.hs') ||
      contains(github.event.head_commit.modified, 'default.nix') ||
      contains(github.event.head_commit.modified, 'my-site.cabal')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build site executable
        run: make build

      - name: Publish site binary as prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: site-binary
          name: "Site Binary (latest)"
          body: "Auto-published Hakyll site builder binary."
          prerelease: true
          files: result/bin/site

  deploy:
    needs: build-binary
    # Run when build-binary succeeded or was skipped (site.hs unchanged); never on PRs.
    if: >
      always() &&
      needs.build-binary.result != 'failure' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download site binary from release
        uses: robinraju/release-downloader@v1
        with:
          tag: site-binary
          fileName: site

      - name: Install site binary
        run: |
          mkdir -p result/bin
          mv site result/bin/site
          chmod +x result/bin/site

      - name: Generate site
        run: make generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

